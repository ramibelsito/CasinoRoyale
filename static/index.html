<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Casino Royale</title>
    <style>
    :root {
        --bg: #f3f4f6;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #007bff;
        --primary-hover: #0056b3;
        --dark: #111827;
        --dark-hover: #030712;
        --border: #d1d5db;
        --shadow: 0 10px 30px rgba(0,0,0,0.10);
        --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100svh;
        margin: 0;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
    }

    .form-container {
        width: min(100%, 420px);
        background: var(--card);
        padding: 28px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
    }

    h1 {
        text-align: center;
        color: #333;
        margin: 0 0 8px;
        font-size: clamp(24px, 4vw, 30px);
    }

    .subtitle {
        text-align: center;
        color: var(--muted);
        margin: 0 0 24px;
        font-size: 14px;
    }

    form {
        display: grid;
        gap: 12px;
    }

    input {
        width: 100%;
        min-height: 48px;
        padding: 12px 14px;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 16px;
    }

    input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
    }

    button,
    .secondary-btn {
        width: 100%;
        min-height: 48px;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
    }

    button {
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
    }

    .auth-actions {
        display: grid;
        gap: 10px;
        margin-top: 18px;
    }

    .secondary-btn {
        background: white;
        color: var(--text);
        border: 1px solid var(--border);
    }

    .secondary-btn:hover {
        background: #f9fafb;
        transform: translateY(-1px);
    }

    .secondary-btn--dark {
        background: var(--dark);
        color: white;
        border-color: var(--dark);
    }

    .secondary-btn--dark:hover {
        background: var(--dark-hover);
    }

    @media (min-width: 480px) {
        .auth-actions {
            grid-template-columns: 1fr 1fr;
        }
    }
</style>
</head>
<body>
    <div class="form-container">
        <h1>Registro</h1>
        <p class="subtitle">Ingresá tus datos para empezar a jugar</p>

        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellido" placeholder="Apellido" required>
            <input type="text" id="dni" placeholder="DNI" required>
            <button type="submit">Registrar</button>
        </form>

        <div class="auth-actions">
            <a href="/login" class="secondary-btn">Ya tengo cuenta</a>
            <a href="/crupier/login" class="secondary-btn secondary-btn--dark">Acceso crupier</a>
        </div>
    </div>
    <script>
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const apellido = document.getElementById('apellido').value;
            const dni = document.getElementById('dni').value;

            const response = await fetch('/registro', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nombre, apellido, dni})
            });

            if (response.ok) {
                window.location.href = '/login';
            } else {
                alert('Error en registro');
            }
        });
    </script>
</body>
</html>
